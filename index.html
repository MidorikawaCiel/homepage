<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My SNS Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 1rem;
            border: 3px solid #eee;
        }
        h1 {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 0.5rem;
        }
        p {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .link-card {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #333;
            color: white;
            text-decoration: none;
            padding: 12px;
            margin-bottom: 1rem;
            border-radius: 10px;
            transition: transform 0.2s, background 0.2s;
        }
        .link-card i {
            margin-right: 10px;
        }
        .link-card:hover {
            transform: translateY(-3px);
            opacity: 0.9;
        }
        /* 各SNSのブランドカラー */
        .twitter   { background-color: #1DA1F2; }
        .instagram { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .youtube   { background-color: #FF0000; }
        .github    { background-color: #333333; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://via.placeholder.com/150" alt="Profile" class="profile-img">
    
    <h1>緑川シエル</h1>
    <p>クイズゲーム制作者の緑川シエルです。</p>

    <a href="https://x.com/i/user/1752924888871088128" class="link-card twitter">
        <i class="fa-brands fa-x-twitter"></i> Twitter (X)
    </a>
    

    <a href="https://www.youtube.com/channel/UCAnPyVyVNkuhurX9AHwLBwA" class="link-card youtube">
        <i class="fa-brands fa-youtube"></i> YouTube
    </a>

    <a href="https://www.pixiv.net/users/90291228" class="link-card pixiv">
        <i class="fa-solid fa-palette"></i> Pixiv
    </a>
    
    <a href="https://midorikawaciel.booth.pm/" class="link-card booth">
        <i class="fa-solid fa-cart-shopping"></i> BOOTH
    </a>
    <a href="https://hub.vroid.com/users/90291228" class="link-card vroid">
        <i class="fa-solid fa-cube"></i> VRoid Hub
    </a>
    <a href="https://plicy.net/User/78268" class="link-card plicy">
        <i class="fa-solid fa-gamepad"></i> PLiCy
    </a>
    
    <a href="https://github.com/MidorikawaCiel" class="link-card github">
        <i class="fa-brands fa-github"></i> GitHub
    </a>
</div>

</body>
</html>
