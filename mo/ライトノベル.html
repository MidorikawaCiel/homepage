<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ライトノベル</title>
    <style>
        body { font-family: sans-serif; padding: 20px; color: #333; }
        h2 { margin-bottom: 20px; }
        
        #searchInput {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            font-size: 16px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        .table-container {
            overflow-x: auto;
            max-height: 85vh; 
            border: 1px solid #ccc;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
        }

        th {
            background-color: #eee;
            position: sticky;
            top: 0;
            z-index: 10;
            cursor: pointer;
            user-select: none;
            border: 1px solid #ccc;
            padding: 10px;
            text-align: left;
        }

        th::after { 
            content: " ↕"; 
            color: #888; 
            font-size: 0.8em; 
        }

        td {
            border: 1px solid #ccc;
            padding: 8px 10px;
            text-align: left;
            background-color: #fff;
        }

        .col-title { width: 20%; }
        .col-kana { width: 15%; }
        .col-author { width: 15%; }
        .col-group { width: 20%; }
        .col-desc { width: 30%; }

        tr { background-color: #fff; }
    </style>
</head>
<body>

    <h2>ライトノベル</h2>
    <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="検索...">

    <div class="table-container">
        <table id="myTable">
            <thead>
                <tr>
                    <th onclick="sortTable(0)" class="col-title">タイトル</th>
                    <th onclick="sortTable(1)" class="col-kana">読み</th>
                    <th onclick="sortTable(2)" class="col-author">作者</th>
                    <th onclick="sortTable(3)" class="col-group">グループ</th>
                    <th onclick="sortTable(4)" class="col-desc">説明</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>

<script>
    const novelData = [
        ["『薬屋のひとりごと』", "クスリヤノヒトリゴト", "日向夏", "なろう, ヒーロー文庫", "下女として後宮へ売られた薬師の少女・猫猫が王宮内で起こる事件を解決していく。"],
        ["『この素晴らしい世界に祝福を！』", "コノスバラシイセカイニシュクフクヲ", "暁なつめ", "なろう, 角川スニーカー文庫, 異世界", "命を落とした少年・佐藤和真が女神アクアとともに異世界転生して冒険者となる。"],
        ["『人外教室の人間嫌い教師』", "ジンガイキョウシツノニンゲンギライキョウシ", "来栖夏芽", "MF文庫J", "人間関係にトラウマをもつ人間零が人外が人間になるための女子校で教師として過ごす日々を描く。"],
        ["『男女の友情は成立する？（いや、しないっ!!）』", "ダンジョノユウジョウハセイリツスルイヤシナイッ", "七菜なな", "電撃文庫, ラブコメ", "永遠の友情を誓った夏目悠宇と犬塚日葵の関係が、悠宇の初恋の人・榎本凛音の登場により変化していく。"],
        ["『とある魔術の禁書目録』", "トアルマジュツノインデックス", "鎌池和馬", "電撃文庫", "学園都市を舞台にあらゆる能力を打ち消す「幻想殺し」をもつ少年・上条当麻がシスターの少女を救うために戦う。"],
        ["『ノーゲーム・ノーライフ』", "ノーゲームノーライフ", "榎宮祐", "MF文庫J, 異世界", "空と白の天才ゲーマー兄妹が、この世の全てが単純なゲームで決まる世界を舞台に頭脳ゲームに挑む。"],
        ["『這いよれ！ ニャル子さん』", "ハイヨレニャルコサン", "逢空万太", "GA文庫, ラブコメ, パロディ", "男子高校生の八坂真尋とクトゥルー神話の邪神・ニャルラトホテプを名乗る美少女の日常を描く。"],
        ["『VTuberなんだが配信切り忘れたら伝説になってた』", "ブイチューバーナンダガハイシンキリワスレタラデンセツニナッテタ", "七斗七", "ファンタジア文庫, カクヨム", "配信を切り忘れてしまったVTuber・心音淡雪を主人公とする。"],
        ["『負けヒロインが多すぎる！』", "マケヒロインガオオスギル", "雨森たきび", "ガガガ文庫, ラブコメ", "愛知県豊橋市を舞台に、男子高校生の温水和彦と複数の負けヒロインたちの関係が描かれる。"],
        ["『Re:ゼロから始める異世界生活』", "リゼロカラハジメルイセカイセイカツ", "長月達平", "なろう, MF文庫J, 異世界", "異世界に召喚された少年ナツキ・スバルが「死に戻り」の能力を使い残酷な運命に立ち向かう。"],
        ["『りゅうおうのおしごと！』", "リュウオウノオシゴト", "白鳥士郎", "GA文庫", "16歳で将棋のタイトルを獲得した九頭竜八一と、弟子になるために押しかけてきた小学生・雛鶴あいの生活を描く。"],
        ["『時々ボソッとロシア語でデレる隣のアーリャさん』", "トキドキボソットロシアゴデデレルトナリノアーリャサン", "燦々SUN", "なろう, 角川スニーカー文庫, ラブコメ", "ロシア語が分かる久世政近と、それを知らずにロシア語で小言を言うアリサ・ミハイロヴナ・九条の関係を描く。"]
    ];

    const tbody = document.getElementById("tableBody");

    function renderTable() {
        tbody.innerHTML = "";
        novelData.forEach(n => {
            const tr = document.createElement("tr");
            tr.innerHTML = `<td>${n[0]}</td><td>${n[1]}</td><td>${n[2]}</td><td>${n[3]}</td><td>${n[4]}</td>`;
            tbody.appendChild(tr);
        });
    }
    renderTable();

    function hiraToKana(str) {
        return str.replace(/[\u3041-\u3096]/g, m => String.fromCharCode(m.charCodeAt(0) + 0x60));
    }

    function filterTable() {
        const input = document.getElementById("searchInput");
        const filter = hiraToKana(input.value.trim().toUpperCase());
        const tr = tbody.getElementsByTagName("tr");

        for (let i = 0; i < tr.length; i++) {
            let found = false;
            const tds = tr[i].getElementsByTagName("td");
            if (filter === "") {
                tr[i].style.display = "";
                continue;
            }
            // 部分一致 (タイトル, 読み, 作者)
            for (let j = 0; j <= 2; j++) {
                const text = hiraToKana(tds[j].textContent.toUpperCase());
                if (text.indexOf(filter) > -1) { found = true; break; }
            }
            // 完全一致 (グループ)
            if (!found && tds[3]) {
                const groups = tds[3].textContent.split(",").map(g => hiraToKana(g.trim().toUpperCase()));
                if (groups.includes(filter)) found = true;
            }
            tr[i].style.display = found ? "" : "none";
        }
    }

    function sortTable(n) {
        const table = document.getElementById("myTable");
        let switching = true;
        let dir = "asc"; 
        let switchcount = 0;
        while (switching) {
            switching = false;
            const rows = tbody.rows;
            for (var i = 0; i < (rows.length - 1); i++) {
                var shouldSwitch = false;
                const x = rows[i].getElementsByTagName("td")[n];
                const y = rows[i + 1].getElementsByTagName("td")[n];
                const xVal = x.textContent.toLowerCase();
                const yVal = y.textContent.toLowerCase();
                if (dir === "asc" ? xVal > yVal : xVal < yVal) { shouldSwitch = true; break; }
            }
            if (shouldSwitch) {
                rows[i].parentNode.insertBefore(rows[i + 1], rows[i]);
                switching = true;
                switchcount++;
            } else if (switchcount === 0 && dir === "asc") {
                dir = "desc";
                switching = true;
            }
        }
    }
</script>

</body>
</html>
