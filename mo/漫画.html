<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>漫画作品データベース（シンプル版）</title>
    <style>
        body { font-family: sans-serif; padding: 20px; color: #000; background-color: #fff; }
        h2 { border-bottom: 1px solid #000; padding-bottom: 10px; margin-bottom: 20px; }
        
        .controls { position: sticky; top: 0; background: #fff; padding: 10px 0; z-index: 100; }
        #searchInput {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #000;
            box-sizing: border-box;
        }

        .table-container { overflow-x: auto; max-height: 80vh; border: 1px solid #000; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }

        th {
            background-color: #fff;
            position: sticky;
            top: 0;
            z-index: 10;
            cursor: pointer;
            border: 1px solid #000;
            padding: 10px;
            text-align: left;
        }

        td { border: 1px solid #000; padding: 10px; text-align: left; }
        
        /* 列ごとの幅調整（色の指定なし） */
        .col-title { width: 20%; }
        .col-author { width: 15%; }
        .col-group { width: 20%; }
        .col-desc { width: 30%; }

    </style>
</head>
<body>

<div class="container">
    <h2>漫画作品データベース</h2>
    
    <div class="controls">
        <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="タイトル、作者、またはグループ名で検索...">
    </div>

    <div class="table-container">
        <table id="myTable">
            <thead>
                <tr>
                    <th onclick="sortTable(0)">タイトル</th>
                    <th onclick="sortTable(1)">読み</th>
                    <th onclick="sortTable(2)">作者</th>
                    <th onclick="sortTable(3)">グループ</th>
                    <th onclick="sortTable(4)">説明</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    const mangaData = [
        ["ONE PIECE", "わんぴーす", "尾田栄一郎", "少年漫画, ジャンプ, 連載中", "海賊王を目指す壮大な海洋冒険ロマン。"],
        ["ドラえもん", "どらえもん", "藤子・F・不二雄", "児童漫画, 完結", "未来から来たネコ型ロボットとの日常。"],
        ["進撃の巨人", "しんげきのきょじん", "諫山創", "少年漫画, マガジン, 完結", "巨人と人類の戦いを描くダークファンタジー。"],
        ["鋼の錬金術師", "はがねのれんきんじゅつし", "荒川弘", "少年漫画, ガンガン, 完結", "等価交換の原則の下、失った体を取り戻す旅。"],
        ["名探偵コナン", "めいたんていこなん", "青山剛昌", "少年漫画, サンデー, 連載中", "見た目は子供、頭脳は大人。難事件を解決する推理漫画。"],
        ["SLAM DUNK", "すらむだんく", "井上雄彦", "少年漫画, ジャンプ, 完結", "不良少年・桜木花道がバスケットボールを通じて成長。"],
        ["3月のライオン", "さんがつのらいおん", "羽海野チカ", "青年漫画, 連載中", "若き将棋棋士の孤独と周囲の交流。"]
    ];

    const tbody = document.getElementById("tableBody");
    mangaData.forEach(m => {
        let tr = document.createElement("tr");
        tr.innerHTML = `
            <td class="col-title">${m[0]}</td>
            <td>${m[1]}</td>
            <td class="col-author">${m[2]}</td>
            <td class="col-group">${m[3]}</td>
            <td>${m[4]}</td>
        `;
        tbody.appendChild(tr);
    });

    function hiraToKana(str) {
        return str.replace(/[\u3041-\u3096]/g, m => String.fromCharCode(m.charCodeAt(0) + 0x60));
    }

    function filterTable() {
        const input = document.getElementById("searchInput");
        const filter = hiraToKana(input.value.trim().toUpperCase());
        const tr = tbody.getElementsByTagName("tr");

        for (let i = 0; i < tr.length; i++) {
            let found = false;
            const tds = tr[i].getElementsByTagName("td");
            
            // 0:タイトル, 1:読み, 2:作者 (部分一致)
            for (let j = 0; j <= 2; j++) {
                const text = hiraToKana(tds[j].textContent.toUpperCase());
                if (text.indexOf(filter) > -1) { found = true; break; }
            }

            // 3:グループ (完全一致)
            if (!found && tds[3]) {
                const groups = tds[3].textContent.split(",").map(g => hiraToKana(g.trim().toUpperCase()));
                if (groups.includes(filter)) found = true;
            }

            tr[i].style.display = found || filter === "" ? "" : "none";
        }
    }

    function sortTable(n) {
        const table = document.getElementById("myTable");
        let switching = true;
        let dir = "asc"; 
        let switchcount = 0;

        while (switching) {
            switching = false;
            const rows = table.rows;
            for (var i = 1; i < (rows.length - 1); i++) {
                var shouldSwitch = false;
                const x = rows[i].getElementsByTagName("td")[n];
                const y = rows[i + 1].getElementsByTagName("td")[n];
                const xVal = (x.textContent || x.innerText).toLowerCase();
                const yVal = (y.textContent || y.innerText).toLowerCase();
                if (dir === "asc" ? xVal > yVal : xVal < yVal) { shouldSwitch = true; break; }
            }
            if (shouldSwitch) {
                rows[i].parentNode.insertBefore(rows[i + 1], rows[i]);
                switching = true;
                switchcount++;
            } else if (switchcount === 0 && dir === "asc") {
                dir = "desc";
                switching = true;
            }
        }
    }
</script>

</body>
</html>
