<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>漫画</title>
    <style>
        body { font-family: sans-serif; padding: 20px; color: #333; }
        h2 { margin-bottom: 20px; } /* 下線を削除し、余白のみに設定 */
        
        #searchInput {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            font-size: 16px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        .table-container {
            overflow-x: auto;
            max-height: 700px;
            border: 1px solid #ccc;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
        }

        th {
            background-color: #eee;
            position: sticky;
            top: 0;
            z-index: 10;
            cursor: pointer;
            user-select: none;
            border: 1px solid #ccc;
            padding: 10px;
            text-align: left;
        }

        th::after { 
            content: " ↕"; 
            color: #888; 
            font-size: 0.8em; 
        }

        td {
            border: 1px solid #ccc;
            padding: 8px 10px;
            text-align: left;
        }

        td:nth-child(5) { width: 30%; }

        tr { background-color: #fff; }
    </style>
</head>
<body>

    <h2>漫画</h2>
    <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="検索...">

    <div class="table-container">
        <table id="myTable">
            <thead>
                <tr>
                    <th onclick="sortTable(0)">タイトル</th>
                    <th onclick="sortTable(1)">読み</th>
                    <th onclick="sortTable(2)">作者</th>
                    <th onclick="sortTable(3)">グループ</th>
                    <th onclick="sortTable(4)">説明</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>

<script>
    const mangaData = [
        ["『暗殺教室』", "アンサツキョウシツ", "松井優征", "ジャンプ, 中学", "椚ヶ丘中学校を舞台に、担任となった謎の生物・殺せんせーを殺すことを目指すE組の生徒たちの日常が描かれる。"],
        ["『H2』", "エイチツー", "あだち充", "サンデー, 高校, 野球", "国見比呂、橘英雄、雨宮ひかり、古賀春華の4人の関係を描く。"],
        ["『お兄ちゃんはおしまい！』", "オニイチャンハオシマイ", "ねことうふ", "レックス, 中学, TSF", "妹の薬で女の子になってしまった緒山まひろが主人公。"],
        ["『かぐや様は告らせたい〜天才たちの恋愛頭脳戦〜』", "カグヤサマハコクラセタイテンサイタチノレンアイズノウセン", "赤坂アカ", "ジャンプ, 高校, ラブコメ", "秀知院学園の生徒会を舞台に、生徒会長の白銀御行と副生徒会長の四宮かぐやの恋愛頭脳戦を描く。"],
        ["『がっこうぐらし！』", "ガッコウグラシ", "原作：海法紀光(ニトロプラス)<br>作画：千葉サドル", "きらら, 高校, ゾンビ, サバイバル, ホラー", "学校に寝泊まりする学園生活部の「日常」を描く。"],
        ["『五等分の花嫁』", "ゴトウブンノハナヨメ", "春場ねぎ", "マガジン, ラブコメ, 高校", "男子高校生の上杉風太郎が中野家の五つ子の家庭教師を務める。"],
        ["『しかのこのこのここしたんたん』", "シカノコノコノココシタンタン", "おしおしお", "マガジン, 高校", "都立日野南高校を舞台に、元ヤンの女子高生・虎視虎子と、頭にツノが生えている謎の少女・鹿乃子のこの日常を描く。"],
        ["『邪神ちゃんドロップキック』", "ジャシンチャンドロップキック", "ユキヲ", "メテオ", "神保町に住む女子大生・花園ゆりねと、彼女を殺そうとする悪魔・邪神ちゃんの同居生活を描く。"],
        ["『進撃の巨人』", "シンゲキノキョジン", "諫山創", "マガジン, ファンタジー", "突如表れた巨人と人類の戦いを描く。英語では『Attack on Titan』。"],
        ["『SPY×FAMILY』", "スパイファミリー", "遠藤達哉", "ジャンプ, アクション, コメディ", "仮初めの家族として生活するスパイのロイド、殺し屋のヨル、超能力者のアーニャの3人の日常を描く。"],
        ["『葬送のフリーレン』", "ソウソウノフリーレン", "原作：山田鐘人<br>作画：アベツカサ", "サンデー, ファンタジー", "勇者ヒンメルの死をきっかけに長命のエルフ・フリーレンが人間を知るための旅に出る。"],
        ["『タコピーの原罪』", "タコピーノゲンザイ", "タイザン5", "ジャンプ, いじめ, 宇宙人", "地球にハッピーを広めるためにきた宇宙人・タコピーといじめをうけている小学生・久世しずかの交流を描く。"],
        ["『チ。-地球の運動について-』", "チチキュウノウンドウニツイテ", "魚豊", "ビッグコミック, 天文", "15世紀のヨーロッパを舞台に、禁じられた地動説を命がけで研究する者たちの生き様と信念を描く。"],
        ["『ドラえもん』", "ドラエモン", "藤子・F・藤雄", "コロコロ, てれびくん, 小学, ロボット", "未来から来たネコ型ロボット「ドラえもん」が勉強もスポーツも苦手な小学生・野比のび太を未来の道具(ひみつ道具)で助ける日常を描く。第1話は「未来の国からはるばると」。"],
        ["『ひなこのーと』", "ヒナコノート", "三月", "アライブ, 高校", "口下手な少女・桜木ひな子が演劇部に入り人とスラスラ話せるようになりたいと意気込んで上京してくるところから始まる。"],
        ["『ぷにるはかわいいスライム』", "プニルハカワイイスライム", "まえだくん", "コロコロ, 小学", "中学生のコタローがスライムのぷにるに振り回される日々を描く。"],
        ["『ブラック・ジャック』", "ブラックジャック", "手塚治虫", "チャンピオン, 医療", "無免許の天才外科医ブラック・ジャックの活躍を描く。"],
        ["『ブルーロック』", "ブルーロック", "原作：金城宗幸<br>作画：ノ村優介", "マガジン, サッカー", "日本をW杯優勝に導くストライカーを養成すべく集められた300人が日本代表となる権利をかけて競い合う。"],
        ["『ボボボーボ・ボーボボ』", "ボボボーボボーボボ", "澤井啓夫", "ジャンプ, アクション", "毛狩り隊から人類の髪の毛の自由と平和を守るため、鼻毛真拳の使い手ボボボーボ・ボーボボが戦う。"],
        ["『魔王城でおやすみ』", "マオウジョウデオヤスミ", "熊之股鍵次", "サンデー, ファンタジー", "魔王の城にとらわれたスヤリス姫が安眠を求めて奮闘する。"],
        ["『まちカドまぞく』", "マチカドマゾク", "伊藤いづも", "きらら, 高校, 魔法, 魔法少女, 4コマ", "光と闇の一族が共存する多魔市を舞台に、ある日突然魔族として覚醒した少女・吉田優子と宿敵の魔法少女・千代田桃の交流が描かれる。"],
        ["『マッシュル-MASHLE-』", "マッシュル", "甲本一", "ジャンプ, 魔法", "魔法が当たり前の魔法界に生まれながら魔法が全く使えないマッシュ・バーンデッドが鍛え上げた肉体を武器に戦う姿が描かれる。"],
        ["『メダリスト』", "メダリスト", "つるまいかだ", "アフタヌーン, 小学, フィギュアスケート", "名古屋市を舞台に、明浦路司のもとで小学5年生の少女・結束いのりがフィギュアスケートでオリンピック金メダルを目指して奮闘する姿を描く。"],
        ["『八十亀ちゃんかんさつにっき』", "ヤトガメチャンカンサツニッキ", "安藤正基", "レックス, 高校, ご当地", "東京から名古屋に引っ越してきた高校生・陣界斗の視点から名古屋の土地柄を描く。"],
        ["『ゆるキャン△』", "ユルキャン", "あfろ", "きらら, 高校", "女子高生の志摩リンや各務原なでしこたちがキャンプを楽しむ姿が描かれる。"],
        ["『らんま1/2』", "ランマニブンノイチ", "高橋留美子", "サンデー, 高校, ラブコメ, TSF", "水をかぶると女の子になってしまう体質の高校生格闘家・早乙女乱馬が主人公。"],
        ["『るろうに剣心 -明治剣客浪漫譚-』", "ルロウニケンシンメイジケンキャクロマンタン", "和月伸宏", "ジャンプ, 時代", "幕末の伝説の剣客・緋村剣心を描く。"],
        ["『私に天使が舞い降りた!』", "ワタシニテンシガマイオリタ", "椋木ななつ", "百合姫, 百合, 4コマ", "女子大生の星野みやこと、彼女が一目惚れした小学5年生の白咲花の交流を描く。"],
        ["『笑ゥせぇるすまん』", "ワラウセエルスマン", "藤子不二雄Ⓐ", "中公", "主人公の喪黒福造が約束を守ることを条件に客の願いを叶える。"],
        ["『ONE PIECE』", "ワンピース", "尾田栄一郎", "ジャンプ, 冒険, ファンタジー, アクション", "海賊王を夢見る少年モンキー・D・ルフィの冒険を描く。"]
    ];

    const tbody = document.getElementById("tableBody");
    mangaData.forEach(m => {
        let tr = document.createElement("tr");
        tr.innerHTML = `<td>${m[0]}</td><td>${m[1]}</td><td>${m[2]}</td><td>${m[3]}</td><td>${m[4]}</td>`;
        tbody.appendChild(tr);
    });

    function hiraToKana(str) {
        return str.replace(/[\u3041-\u3096]/g, m => String.fromCharCode(m.charCodeAt(0) + 0x60));
    }

    function filterTable() {
        const input = document.getElementById("searchInput");
        const filter = hiraToKana(input.value.trim().toUpperCase());
        const tr = tbody.getElementsByTagName("tr");

        for (let i = 0; i < tr.length; i++) {
            let found = false;
            const tds = tr[i].getElementsByTagName("td");
            
            for (let j = 0; j <= 2; j++) {
                const text = hiraToKana(tds[j].textContent.toUpperCase());
                if (text.indexOf(filter) > -1) { found = true; break; }
            }

            if (!found && tds[3]) {
                const groups = tds[3].textContent.split(",").map(g => hiraToKana(g.trim().toUpperCase()));
                if (groups.includes(filter)) found = true;
            }

            tr[i].style.display = found || filter === "" ? "" : "none";
        }
    }

    function sortTable(n) {
        const table = document.getElementById("myTable");
        let switching = true;
        let dir = "asc"; 
        let switchcount = 0;

        while (switching) {
            switching = false;
            const rows = table.rows;
            for (var i = 1; i < (rows.length - 1); i++) {
                var shouldSwitch = false;
                const x = rows[i].getElementsByTagName("td")[n];
                const y = rows[i + 1].getElementsByTagName("td")[n];
                const xVal = (x.textContent || x.innerText).toLowerCase();
                const yVal = (y.textContent || y.innerText).toLowerCase();
                if (dir === "asc" ? xVal > yVal : xVal < yVal) { shouldSwitch = true; break; }
            }
            if (shouldSwitch) {
                rows[i].parentNode.insertBefore(rows[i + 1], rows[i]);
                switching = true;
                switchcount++;
            } else if (switchcount === 0 && dir === "asc") {
                dir = "desc";
                switching = true;
            }
        }
    }
</script>

</body>
</html>
